# Локальная проверка / прод без туннеля: `docker compose up -d --build`.
#
# CRUSADE_SERVER_URL/CRUSADE_HTTP_URL — публичные адреса игрового сервера, ими
# собирается клиентский бандл (см. client/Dockerfile). Для локальной проверки
# подойдут значения по умолчанию ниже; для прода задай их в .env рядом с этим
# файлом (ws:// → wss://, http:// → https://) ДО первого `--build` — после
# сборки бандл не перепрошить без пересборки образа.
services:
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "2567:2567"
    volumes:
      - server-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2567/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: ${CRUSADE_SERVER_URL:-ws://localhost:2567}
        VITE_HTTP_URL: ${CRUSADE_HTTP_URL:-http://localhost:2567}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  # Аккаунты (server/data/accounts.json) — единственное, что должно пережить
  # пересоздание контейнера. Комнаты и партии живут только в памяти процесса.
  server-data:
