# SPA-фоллбэк: ссылки-приглашения вида /r/КОД должны отдавать index.html при
# прямой загрузке, а не 404 — без этого перезагрузка страницы в комнате падает.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
